<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flag Master Pro - Ultimate Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #6366f1;
            --accent-light: #818cf8;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: var(--text-main);
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-shell {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            position: relative;
            background: var(--bg);
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen {
            position: absolute;
            inset: 0;
            padding: 24px;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
            z-index: 10;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .stat-badge {
            background: var(--glass);
            padding: 8px 16px;
            border-radius: 99px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .stat-badge i { color: var(--accent-light); }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px solid var(--border);
            padding: 32px;
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .btn-fancy {
            background: linear-gradient(135deg, var(--accent), #4338ca);
            color: white;
            border: none;
            padding: 18px 24px;
            border-radius: 18px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-fancy:active { transform: scale(0.96); }

        .btn-outline {
            background: var(--glass);
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        .question-label {
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.75rem;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .question-text {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 32px;
            line-height: 1.2;
        }

        .flag-container {
            width: 100%;
            height: 180px;
            background: var(--glass);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 32px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .flag-img {
            max-height: 120px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }

        .options-list {
            display: grid;
            gap: 12px;
            margin-top: auto;
        }

        .option-item {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 16px 20px;
            border-radius: 16px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-item:hover { background: rgba(255,255,255,0.06); }
        .option-item.correct { 
            background: rgba(34, 197, 94, 0.2); 
            border-color: var(--success);
            color: var(--success);
        }
        .option-item.wrong { 
            background: rgba(239, 68, 68, 0.2); 
            border-color: var(--danger);
            color: var(--danger);
        }

        .progress-track {
            height: 6px;
            background: var(--glass);
            border-radius: 99px;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s ease;
        }

        .streak-fire {
            animation: flicker 0.5s infinite alternate;
            color: #fbbf24 !important;
        }

        @keyframes flicker {
            0% { opacity: 0.8; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        .feedback-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5rem;
            opacity: 0;
        }

        .hero-title {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to bottom right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <div class="app-shell">
        
        <div id="screen-loading" class="screen active" style="justify-content: center; align-items: center;">
            <div class="stat-badge" style="font-size: 1.5rem; padding: 20px;">
                <i class="fas fa-globe-africa fa-spin"></i>
            </div>
            <p style="margin-top: 20px; color: var(--text-dim)" id="loading-text">Initialisation du monde...</p>
            <button id="retry-btn" class="btn-fancy btn-outline" style="display: none; width: auto; margin-top: 20px;" onclick="game.init()">Réessayer</button>
        </div>

        <div id="screen-menu" class="screen">
            <div style="margin-top: 60px; text-align: center;">
                <p style="color: var(--accent-light); font-weight: 800; letter-spacing: 4px;">BIENVENUE SUR</p>
                <h1 class="hero-title">FLAG MASTER</h1>
                <p style="color: var(--text-dim); margin-bottom: 40px;">Testez vos connaissances géographiques mondiales</p>
            </div>

            <div class="options-list" style="margin-top: auto;">
                <button class="btn-fancy" onclick="game.start('flag')">
                    <i class="fas fa-flag"></i> Mode Drapeaux
                </button>
                <button class="btn-fancy btn-outline" onclick="game.start('capital')">
                    <i class="fas fa-city"></i> Mode Capitales
                </button>
                <button class="btn-fancy btn-outline" onclick="game.start('country')">
                    <i class="fas fa-map-marked-alt"></i> Mode Pays
                </button>
            </div>
        </div>

        <div id="screen-game" class="screen">
            <div class="top-bar">
                <button class="btn-outline" style="width: 40px; height: 40px; border-radius: 12px; border: none; background: var(--glass);" onclick="game.quit()">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <div class="stat-badge">
                    <i class="fas fa-fire streak-fire" id="stat-streak-icon"></i>
                    <span id="stat-streak">0</span>
                </div>
                <div class="stat-badge">
                    <i class="fas fa-heart" style="color: var(--danger)"></i>
                    <span id="stat-lives">3</span>
                </div>
            </div>

            <div class="progress-track">
                <div id="progress-bar" class="progress-fill"></div>
            </div>

            <div id="question-area">
                <div class="question-label" id="label-type">PAYS</div>
                <div class="question-text" id="question-text">France</div>
                <div class="flag-container" id="flag-display" style="display: none;">
                    <img src="" class="flag-img" id="flag-img">
                </div>
            </div>

            <div class="options-list" id="options-grid">
            </div>

            <div style="margin-top: 24px;">
                <button class="btn-fancy btn-outline" style="padding: 12px; font-size: 0.9rem;" id="btn-hint" onclick="game.useHint()">
                    <i class="fas fa-lightbulb"></i> Indice (Aide visuelle)
                </button>
            </div>
        </div>

        <div id="screen-result" class="screen" style="justify-content: center;">
            <div class="card">
                <div class="stat-badge" style="margin: 0 auto 20px; width: fit-content;">
                    <i class="fas fa-trophy" style="color: #fbbf24"></i> SCORE FINAL
                </div>
                <h2 id="final-score" style="font-size: 3.5rem; margin: 0;">240</h2>
                <p id="final-msg" style="color: var(--text-dim); margin: 20px 0 40px;">Impressionnant ! Vous connaissez vos pays.</p>
                <button class="btn-fancy" onclick="game.showMenu()">REJOUER</button>
            </div>
        </div>

    </div>

    <div id="feedback" class="feedback-overlay"></div>

    <script>
        // Use a more stable backup API source (GitHub raw)
        const DATA_SOURCE = 'https://raw.githubusercontent.com/mledoze/countries/master/countries.json';
        const FLAG_CDN = 'https://flagcdn.com/w320/'; // {cca2}.png

        const game = {
            data: [],
            current: null,
            score: 0,
            lives: 3,
            streak: 0,
            mode: 'flag',
            qCount: 0,
            maxQ: 10,

            async init() {
                const loadingText = document.getElementById('loading-text');
                const retryBtn = document.getElementById('retry-btn');
                
                loadingText.innerText = "Chargement des frontières...";
                retryBtn.style.display = 'none';

                try {
                    const res = await fetch(DATA_SOURCE);
                    const raw = await res.json();
                    
                    // Filter and format data to match previous logic
                    this.data = raw.filter(c => c.capital?.[0] && c.cca2).map(c => ({
                        name: { common: c.name.common },
                        capital: c.capital,
                        cca2: c.cca2.toLowerCase(),
                        flags: { png: `${FLAG_CDN}${c.cca2.toLowerCase()}.png` }
                    }));
                    
                    this.switchScreen('menu');
                } catch (err) {
                    console.error(err);
                    loadingText.innerText = "Erreur de connexion aux serveurs de géographie.";
                    retryBtn.style.display = 'block';
                }
            },

            switchScreen(id) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(`screen-${id}`).classList.add('active');
            },

            start(mode) {
                this.mode = mode;
                this.score = 0;
                this.lives = 3;
                this.streak = 0;
                this.qCount = 0;
                this.updateStats();
                this.nextQuestion();
                this.switchScreen('game');
            },

            nextQuestion() {
                if (this.lives <= 0 || this.qCount >= this.maxQ) {
                    this.end();
                    return;
                }

                this.qCount++;
                const correct = this.data[Math.floor(Math.random() * this.data.length)];
                this.current = correct;

                let options = [correct];
                while(options.length < 4) {
                    const r = this.data[Math.floor(Math.random() * this.data.length)];
                    if(!options.includes(r)) options.push(r);
                }
                options.sort(() => Math.random() - 0.5);

                this.render(options);
            },

            render(options) {
                const text = document.getElementById('question-text');
                const label = document.getElementById('label-type');
                const flagBox = document.getElementById('flag-display');
                const img = document.getElementById('flag-img');
                const grid = document.getElementById('options-grid');
                const progress = document.getElementById('progress-bar');
                const hintBtn = document.getElementById('btn-hint');

                grid.innerHTML = '';
                flagBox.style.display = 'none';
                progress.style.width = `${(this.qCount / this.maxQ) * 100}%`;
                hintBtn.style.opacity = '1';
                hintBtn.style.pointerEvents = 'auto';

                if (this.mode === 'flag') {
                    label.innerText = 'À QUEL PAYS APPARTIENT CE DRAPEAU ?';
                    text.style.display = 'none';
                    flagBox.style.display = 'flex';
                    img.src = this.current.flags.png;
                    this.fillOptions(options, 'name.common', grid);
                } else if (this.mode === 'capital') {
                    label.innerText = 'QUELLE EST LE PAYS DE CETTE CAPITALE ?';
                    text.style.display = 'block';
                    text.innerText = this.current.capital[0];
                    this.fillOptions(options, 'name.common', grid);
                } else {
                    label.innerText = 'QUELLE EST LA CAPITALE DE CE PAYS ?';
                    text.style.display = 'block';
                    text.innerText = this.current.name.common;
                    this.fillOptions(options, 'capital.0', grid);
                }
            },

            fillOptions(options, path, container) {
                options.forEach(opt => {
                    const val = path.split('.').reduce((o, i) => o[i], opt);
                    const div = document.createElement('div');
                    div.className = 'option-item';
                    div.innerHTML = `<span>${val}</span><i class="fas fa-chevron-right" style="opacity: 0.3"></i>`;
                    div.onclick = () => this.check(opt, div);
                    container.appendChild(div);
                });
            },

            check(selected, el) {
                const isCorrect = selected === this.current;
                const items = document.querySelectorAll('.option-item');
                items.forEach(i => i.style.pointerEvents = 'none');

                if (isCorrect) {
                    el.classList.add('correct');
                    this.streak++;
                    this.score += (10 * this.streak);
                    this.showFeedback('✅');
                } else {
                    el.classList.add('wrong');
                    this.streak = 0;
                    this.lives--;
                    this.showFeedback('❌');
                    items.forEach(i => {
                        const val = i.querySelector('span').innerText;
                        const correctVal = this.mode === 'country' ? this.current.capital[0] : this.current.name.common;
                        if(val === correctVal) i.classList.add('correct');
                    });
                }

                this.updateStats();
                setTimeout(() => this.nextQuestion(), 1200);
            },

            showFeedback(emoji) {
                const f = document.getElementById('feedback');
                f.innerText = emoji;
                f.style.opacity = '1';
                f.animate([
                    { transform: 'scale(0.5)', opacity: 0 },
                    { transform: 'scale(1.2)', opacity: 1, offset: 0.5 },
                    { transform: 'scale(1)', opacity: 0 }
                ], { duration: 800 });
            },

            useHint() {
                const hintBtn = document.getElementById('btn-hint');
                hintBtn.style.opacity = '0.5';
                hintBtn.style.pointerEvents = 'none';
                
                if (this.mode !== 'flag') {
                    const flagBox = document.getElementById('flag-display');
                    const img = document.getElementById('flag-img');
                    flagBox.style.display = 'flex';
                    img.src = this.current.flags.png;
                } else {
                    const items = Array.from(document.querySelectorAll('.option-item'));
                    let removed = 0;
                    items.forEach(item => {
                        const val = item.querySelector('span').innerText;
                        if(val !== this.current.name.common && removed < 2) {
                            item.style.opacity = '0.2';
                            item.style.pointerEvents = 'none';
                            removed++;
                        }
                    });
                }
            },

            updateStats() {
                document.getElementById('stat-streak').innerText = this.streak;
                document.getElementById('stat-lives').innerText = this.lives;
                const sIcon = document.getElementById('stat-streak-icon');
                if(this.streak >= 3) sIcon.classList.add('streak-fire');
                else sIcon.classList.remove('streak-fire');
            },

            end() {
                document.getElementById('final-score').innerText = this.score;
                const msg = document.getElementById('final-msg');
                if(this.score > 200) msg.innerText = "Légendaire ! Vous êtes un expert.";
                else if(this.score > 100) msg.innerText = "Pas mal ! Encore un peu d'entraînement.";
                else msg.innerText = "Continuez d'apprendre, le monde est vaste !";
                this.switchScreen('result');
            },

            showMenu() { this.switchScreen('menu'); },
            quit() { if(confirm("Quitter la partie ?")) this.showMenu(); }
        };

        window.onload = () => game.init();
    </script>
</body>
</html>
