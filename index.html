<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flag Master Pro - Europe Edition</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #3b82f6;
            --accent-light: #60a5fa;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: var(--text-main);
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-shell {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            position: relative;
            background: var(--bg);
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen {
            position: absolute;
            inset: 0;
            padding: 24px;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
            z-index: 10;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .stat-badge {
            background: var(--glass);
            padding: 8px 16px;
            border-radius: 99px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .stat-badge i { color: var(--accent-light); }

        .btn-fancy {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 18px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s;
            margin-bottom: 12px;
        }

        .btn-fancy:active { transform: scale(0.96); }

        .btn-outline {
            background: var(--glass);
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        .question-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .question-label {
            color: var(--accent-light);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.75rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .step-dot {
            width: 30px;
            height: 4px;
            background: var(--glass);
            border-radius: 2px;
            transition: all 0.3s;
        }

        .step-dot.active { background: var(--accent-light); width: 60px; }
        .step-dot.done { background: var(--success); }

        .main-display {
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px solid var(--border);
            padding: 24px;
            margin-bottom: 24px;
            text-align: center;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .flag-img {
            max-height: 100px;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .display-text {
            font-size: 1.8rem;
            font-weight: 800;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: auto;
        }

        .option-btn {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 16px 20px;
            border-radius: 16px;
            color: var(--text-main);
            font-weight: 600;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:active { background: rgba(255,255,255,0.1); }
        .option-btn.correct { background: rgba(34, 197, 94, 0.2); border-color: var(--success); color: var(--success); }
        .option-btn.wrong { background: rgba(239, 68, 68, 0.2); border-color: var(--danger); color: var(--danger); }

        .progress-track {
            height: 6px;
            background: var(--glass);
            border-radius: 3px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-light);
            width: 0%;
            transition: width 0.3s ease;
        }

        .feedback-pop {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            pointer-events: none;
            z-index: 100;
            opacity: 0;
        }

        .hero-title {
            font-size: 2.8rem;
            font-weight: 800;
            margin: 10px 0;
            background: linear-gradient(to bottom right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

    <div class="app-shell">
        
        <!-- Chargement -->
        <div id="screen-loading" class="screen active" style="justify-content: center; align-items: center; text-align: center;">
            <div class="stat-badge" style="font-size: 1.5rem; padding: 20px;">
                <i class="fas fa-globe-europe fa-spin"></i>
            </div>
            <p style="margin-top: 20px; color: var(--text-dim)" id="loading-text">Préparation du voyage en Europe...</p>
        </div>

        <!-- Menu Principal -->
        <div id="screen-menu" class="screen">
            <div style="margin-top: 60px; text-align: center;">
                <p style="color: var(--accent-light); font-weight: 800; letter-spacing: 4px;">ÉDITION EUROPE</p>
                <h1 class="hero-title">FLAG MASTER</h1>
                <p style="color: var(--text-dim); margin-bottom: 40px;">Devinez les pays et leurs capitales</p>
            </div>

            <div style="margin-top: auto;">
                <button class="btn-fancy" onclick="game.start('flag')">
                    <i class="fas fa-play"></i> COMMENCER LE QUIZ
                </button>
                <p style="text-align: center; color: var(--text-dim); font-size: 0.85rem; margin-top: 20px;">
                    <i class="fas fa-info-circle"></i> Vous devrez trouver le pays ET sa capitale pour chaque drapeau.
                </p>
            </div>
        </div>

        <!-- Jeu -->
        <div id="screen-game" class="screen">
            <div class="top-bar">
                <button class="btn-outline" style="width: 40px; height: 40px; border-radius: 12px; border: none;" onclick="game.quit()">
                    <i class="fas fa-times"></i>
                </button>
                <div class="stat-badge">
                    <i class="fas fa-fire" id="streak-icon"></i>
                    <span id="stat-streak">0</span>
                </div>
                <div class="stat-badge">
                    <i class="fas fa-heart" style="color: var(--danger)"></i>
                    <span id="stat-lives">3</span>
                </div>
            </div>

            <div class="progress-track">
                <div id="progress-bar" class="progress-fill"></div>
            </div>

            <div class="question-header">
                <div class="question-label" id="step-label">ÉTAPE 1 : LE PAYS</div>
                <div class="step-indicator">
                    <div id="dot-1" class="step-dot active"></div>
                    <div id="dot-2" class="step-dot"></div>
                </div>
            </div>

            <div class="main-display" id="main-display">
                <!-- Drapeau ou Texte injecté ici -->
            </div>

            <div class="options-grid" id="options-grid">
                <!-- Options injectées ici -->
            </div>

            <div style="margin-top: 20px;">
                <button class="btn-fancy btn-outline" style="padding: 10px; font-size: 0.9rem;" onclick="game.showHint()">
                    <i class="fas fa-lightbulb"></i> Besoin d'aide ?
                </button>
            </div>
        </div>

        <!-- Résultats -->
        <div id="screen-result" class="screen" style="justify-content: center;">
            <div class="main-display" style="min-height: 300px;">
                <i class="fas fa-trophy" style="font-size: 3rem; color: #fbbf24; margin-bottom: 20px;"></i>
                <h2 style="margin: 0;">SCORE FINAL</h2>
                <div style="font-size: 4rem; font-weight: 800; color: var(--accent-light);" id="final-score">0</div>
                <p id="final-msg" style="color: var(--text-dim); margin-bottom: 30px;">Bravo ! Vous êtes un expert de l'Europe.</p>
                <button class="btn-fancy" onclick="game.showMenu()">RETOUR AU MENU</button>
            </div>
        </div>

    </div>

    <div id="feedback" class="feedback-pop"></div>

    <script>
        const DATA_SOURCE = 'https://raw.githubusercontent.com/mledoze/countries/master/countries.json';
        const FLAG_CDN = 'https://flagcdn.com/w640/';

        const game = {
            allCountries: [],
            current: null,
            step: 1, // 1: Country, 2: Capital
            score: 0,
            lives: 3,
            streak: 0,
            qIndex: 0,
            maxQuestions: 10,

            async init() {
                try {
                    const res = await fetch(DATA_SOURCE);
                    const raw = await res.json();
                    
                    // Filtrage Europe + Traduction française
                    this.allCountries = raw.filter(c => c.region === 'Europe' && c.capital?.[0]).map(c => ({
                        name: c.translations.fra?.common || c.name.common,
                        capital: c.capital[0],
                        code: c.cca2.toLowerCase()
                    }));
                    
                    this.switchScreen('menu');
                } catch (e) {
                    document.getElementById('loading-text').innerText = "Erreur de chargement. Vérifiez votre connexion.";
                }
            },

            switchScreen(id) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(`screen-${id}`).classList.add('active');
            },

            start() {
                this.score = 0;
                this.lives = 3;
                this.streak = 0;
                this.qIndex = 0;
                this.nextQuestion();
                this.switchScreen('game');
            },

            nextQuestion() {
                if (this.lives <= 0 || this.qIndex >= this.maxQuestions) {
                    this.end();
                    return;
                }

                this.qIndex++;
                this.step = 1;
                this.current = this.allCountries[Math.floor(Math.random() * this.allCountries.length)];
                
                this.updateUI();
                this.renderStep();
            },

            renderStep() {
                const display = document.getElementById('main-display');
                const grid = document.getElementById('options-grid');
                const label = document.getElementById('step-label');
                const dot1 = document.getElementById('dot-1');
                const dot2 = document.getElementById('dot-2');

                grid.innerHTML = '';
                
                if (this.step === 1) {
                    label.innerText = "ÉTAPE 1 : QUEL EST CE PAYS ?";
                    dot1.className = 'step-dot active';
                    dot2.className = 'step-dot';
                    display.innerHTML = `<img src="${FLAG_CDN}${this.current.code}.png" class="flag-img">`;
                    this.fillOptions('name');
                } else {
                    label.innerText = `ÉTAPE 2 : LA CAPITALE DE ${this.current.name.toUpperCase()} ?`;
                    dot1.className = 'step-dot done';
                    dot2.className = 'step-dot active';
                    display.innerHTML = `<div class="display-text">${this.current.name}</div>`;
                    this.fillOptions('capital');
                }
            },

            fillOptions(type) {
                const grid = document.getElementById('options-grid');
                let options = [this.current];
                
                while (options.length < 4) {
                    const r = this.allCountries[Math.floor(Math.random() * this.allCountries.length)];
                    if (!options.includes(r)) options.push(r);
                }
                
                options.sort(() => Math.random() - 0.5);

                options.forEach(opt => {
                    const btn = document.createElement('div');
                    btn.className = 'option-btn';
                    const text = type === 'name' ? opt.name : opt.capital;
                    btn.innerHTML = `<span>${text}</span><i class="fas fa-chevron-right"></i>`;
                    btn.onclick = () => this.check(opt, btn);
                    grid.appendChild(btn);
                });
            },

            check(selected, btn) {
                const isCorrect = selected === this.current;
                const btns = document.querySelectorAll('.option-btn');
                btns.forEach(b => b.style.pointerEvents = 'none');

                if (isCorrect) {
                    btn.classList.add('correct');
                    this.showFeedback('✅');
                    
                    if (this.step === 1) {
                        this.step = 2;
                        setTimeout(() => this.renderStep(), 800);
                    } else {
                        this.streak++;
                        this.score += (10 * this.streak);
                        this.updateUI();
                        setTimeout(() => this.nextQuestion(), 1000);
                    }
                } else {
                    btn.classList.add('wrong');
                    this.lives--;
                    this.streak = 0;
                    this.showFeedback('❌');
                    this.updateUI();

                    // Afficher la bonne réponse
                    btns.forEach(b => {
                        const t = b.querySelector('span').innerText;
                        if (t === (this.step === 1 ? this.current.name : this.current.capital)) {
                            b.classList.add('correct');
                        }
                    });

                    setTimeout(() => this.nextQuestion(), 1500);
                }
            },

            showHint() {
                const btns = Array.from(document.querySelectorAll('.option-btn'));
                const correctText = this.step === 1 ? this.current.name : this.current.capital;
                let hidden = 0;
                
                btns.forEach(b => {
                    if (b.querySelector('span').innerText !== correctText && hidden < 2) {
                        b.style.opacity = '0.3';
                        b.style.pointerEvents = 'none';
                        hidden++;
                    }
                });
            },

            showFeedback(emoji) {
                const f = document.getElementById('feedback');
                f.innerText = emoji;
                f.style.opacity = '1';
                f.animate([
                    { transform: 'translate(-50%, -30%) scale(0.5)', opacity: 0 },
                    { transform: 'translate(-50%, -50%) scale(1.2)', opacity: 1, offset: 0.5 },
                    { transform: 'translate(-50%, -70%) scale(1)', opacity: 0 }
                ], { duration: 800 });
            },

            updateUI() {
                document.getElementById('stat-streak').innerText = this.streak;
                document.getElementById('stat-lives').innerText = this.lives;
                document.getElementById('progress-bar').style.width = `${(this.qIndex / this.maxQuestions) * 100}%`;
                
                const sIcon = document.getElementById('streak-icon');
                if (this.streak >= 3) sIcon.style.color = "#fbbf24";
                else sIcon.style.color = "inherit";
            },

            end() {
                document.getElementById('final-score').innerText = this.score;
                const msg = document.getElementById('final-msg');
                if (this.score >= 200) msg.innerText = "Légendaire ! L'Europe est votre jardin.";
                else if (this.score >= 100) msg.innerText = "Pas mal ! Vous connaissez bien vos classiques.";
                else msg.innerText = "Continuez de réviser, les capitales sont piégeuses !";
                this.switchScreen('result');
            },

            showMenu() { this.switchScreen('menu'); },
            quit() { if (confirm("Quitter la partie ?")) this.showMenu(); }
        };

        window.onload = () => game.init();
    </script>
</body>
</html>
